name: CI — Pull Request Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 1. Lint & code style ────────────────────────────────────────────────
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install flake8 black

      - name: Check formatting with black
        run: |
          black --check --diff .

      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,.venv \
            --statistics

  # ── 2. Run notebook end-to-end ─────────────────────────────────────────
  notebook:
    name: Execute Notebook
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert nbformat jupyter ipykernel

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=600 \
            --output executed_notebook.ipynb \
            notebook.ipynb

      - name: Upload executed notebook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: executed_notebook.ipynb
          retention-days: 7

  # ── 3. Validate outputs exist ───────────────────────────────────────────
  outputs:
    name: Validate Chart Outputs
    runs-on: ubuntu-latest
    needs: notebook

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download executed notebook artifact
        uses: actions/download-artifact@v4
        with:
          name: executed-notebook

      - name: Check required chart files exist
        run: |
          echo "Checking for required output charts..."
          for f in \
            chart1_genre.png \
            chart2_budget.png \
            chart3_reviews.png \
            chart4_bonus.png \
            chart_dashboard_final.png; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

      - name: Check cleaned data CSVs exist
        run: |
          echo "Checking for cleaned data outputs..."
          for f in \
            cleaned_data/cleaned_bom_movie_gross.csv \
            cleaned_data/cleaned_tn_movie_budgets.csv \
            cleaned_data/cleaned_rt_movie_info.csv \
            cleaned_data/cleaned_rt_reviews.csv; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

  # ── 4. Commit message format check ─────────────────────────────────────
  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages follow convention
        run: |
          git log origin/main..HEAD --format="%s" | while read msg; do
            if ! echo "$msg" | grep -qE \
              "^(feat|fix|docs|refactor|data|style|test|chore)(\(.+\))?: .{1,100}$"; then
              echo "Bad commit message: \"$msg\""
              echo "Expected format: type: description"
              echo "Valid types: feat fix docs refactor data style test chore"
              exit 1
            fi
          done
          echo "All commit messages are clean."

  # ── 5. PR title check ──────────────────────────────────────────────────
  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE \
            "^(feat|fix|docs|refactor|data|style|test|chore)(\(.+\))?: .{1,100}$"; then
            echo "PR title does not follow convention: \"$PR_TITLE\""
            echo "Expected format: type: short description"
            echo "Example: feat: add genre ROI breakdown chart"
            exit 1
          fi
          echo "PR title is valid."