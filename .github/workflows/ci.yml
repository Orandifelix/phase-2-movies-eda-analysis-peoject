name: CI — Pull Request Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, development]

jobs:
  # ── 1. Lint & code style ────────────────────────────────────────────────
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Check formatting with black
        run: black --check --diff .

      - name: Lint with flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,.venv \
            --statistics

  # ── 2. Execute notebook + validate outputs ─────────────────────────────
  notebook:
    name: Execute Notebook & Validate Outputs
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ds-v1
          restore-keys: ${{ runner.os }}-pip-

      - name: Install data science environment
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            numpy \
            matplotlib \
            seaborn \
            scipy \
            nbconvert \
            nbformat \
            jupyter \
            ipykernel

      - name: Confirm repo structure before running
        run: |
          echo "=== Repo root ==="
          ls -1
          echo ""
          echo "=== original_data/ ==="
          ls -1 original_data/
          echo ""
          echo "=== public/ ==="
          ls -1 public/ 2>/dev/null || echo "(empty — will be populated by notebook)"

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=600 \
            --inplace \
            movie_studio_EDA.ipynb

      - name: Show all files after notebook run
        run: |
          echo "=== PNGs found ==="
          find . -name "*.png" ! -path "./.git/*" | sort
          echo ""
          echo "=== public/ contents ==="
          ls -lh public/ 2>/dev/null || echo "(public/ not found)"
          echo ""
          echo "=== cleaned_data/ contents ==="
          ls -lh cleaned_data/ 2>/dev/null || echo "(cleaned_data/ not found)"

      - name: Check required chart files exist in public/
        run: |
          echo "Checking for required output charts in public/..."
          for f in \
            public/chart1_genre.png \
            public/chart2_budget.png \
            public/chart3_reviews.png \
            public/chart4_bonus.png \
            public/chart_dashboard_final.png; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

      - name: Check cleaned data CSVs exist
        run: |
          echo "Checking for cleaned data outputs..."
          for f in \
            cleaned_data/cleaned_bom_movie_gross.csv \
            cleaned_data/cleaned_tn_movie_budgets.csv \
            cleaned_data/cleaned_rt_movie_info.csv \
            cleaned_data/views.csv; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

      - name: Upload executed notebook as artifact
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: movie_studio_EDA.ipynb
          retention-days: 7

      - name: Upload charts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: charts
          path: public/*.png
          retention-days: 7

  # ── 3. Commit message format check ─────────────────────────────────────
  commit-lint:
    name: Commit Message Lint (No Restrictions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allow all commit messages
        run: |
          echo "Checking commit messages..."
          git log origin/main..HEAD --format="%s"
          echo "All commit messages are allowed ✅"

  # ── 4. PR title check ──────────────────────────────────────────────────
  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE \
            "^(feat|fix|docs|refactor|data|style|test|chore)(\(.+\))?: .{1,100}$"; then
            echo "PR title does not follow convention: \"$PR_TITLE\""
            echo "Expected format: type: short description"
            echo "Example: feat: add genre ROI breakdown chart"
            exit 1
          fi
          echo "PR title is valid."

  # ── 5. Auto merge development → main ───────────────────────────────────
  auto-merge:
    name: Auto Merge development → main
    runs-on: ubuntu-latest
    needs: [lint, notebook, commit-lint]
    if: github.ref == 'refs/heads/development'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Merge development into main
        run: |
          git fetch origin
          git checkout main
          git merge origin/development --no-ff -m "chore: auto-merge development into main [skip ci]"
          git push origin main
          # ── 5. Auto merge development → main ───────────────────────────────────
          auto-merge:
            name: Auto Merge development → main
            runs-on: ubuntu-latest
            needs: [lint, notebook, commit-lint]
            if: github.ref == 'refs/heads/development'

            steps:
              - name: Checkout repo
                uses: actions/checkout@v4
                with:
                  token: ${{ secrets.GITHUB_TOKEN }}

              - name: Set Git identity
                run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

              - name: Merge development into main
                run: |
                  git fetch origin
                  git checkout main
                  git merge origin/development --no-ff -m "chore: auto-merge development into main [skip ci]"
                  git push origin main
